<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PagoMiChurreria</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f0f0f; color: #e0e0e0; font-family: 'Inter', sans-serif; }
        .gold-border { border: 1px solid #d4af37; }
        .gold-text { color: #d4af37; }
        .gold-bg { background: linear-gradient(135deg, #b8860b 0%, #d4af37 100%); }
        .card { background: #1a1a1a; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .paid { background: #d4af37 !important; color: #000 !important; font-weight: bold; transform: scale(1.1); }
    </style>
</head>
<body class="bg-black text-gray-200">

<div id="login-screen" class="flex flex-col items-center justify-center h-screen p-6">
    <div class="card p-10 w-full max-w-sm text-center border border-gray-800">
        <h1 class="text-3xl font-black mb-2 tracking-tighter">PAGOMI<span class="gold-text">CHURRERIA</span></h1>
        <p class="text-gray-500 text-xs mb-8 uppercase tracking-widest">Sistema de Gestión Premium</p>
        <input type="password" id="pass-input" placeholder="••••••••" class="w-full p-4 rounded-xl bg-black border border-gray-700 mb-6 text-center text-2xl gold-text outline-none focus:border-white transition-all">
        <button onclick="checkLogin()" class="w-full gold-bg text-black font-black py-4 rounded-xl shadow-2xl hover:brightness-110 active:scale-95 transition-all uppercase tracking-widest">Ingresar</button>
    </div>
</div>

<div id="main-app" class="hidden max-w-lg mx-auto p-6">
    <div class="flex justify-between items-end mb-10">
        <div>
            <p class="text-gray-500 text-sm uppercase">Bienvenido</p>
            <h2 class="text-2xl font-bold text-white" id="welcome-msg"></h2>
        </div>
        <button onclick="location.reload()" class="bg-gray-900 text-gray-500 px-4 py-2 rounded-lg text-xs hover:text-white transition">Cerrar Sesión</button>
    </div>

    <div class="grid grid-cols-2 gap-4 mb-10">
        <div class="card p-6 border-l-4 border-[#d4af37]">
            <p class="text-gray-500 text-[10px] uppercase font-bold tracking-widest">Monto Cuota</p>
            <p class="text-2xl font-black text-white">$30.000</p>
        </div>
        <div class="card p-6 border-l-4 border-white">
            <p class="text-gray-500 text-[10px] uppercase font-bold tracking-widest">Total Pagos</p>
            <p class="text-2xl font-black text-white">400</p>
        </div>
    </div>

    <div id="calendar-container" class="space-y-8">
        </div>
</div>

<script>
    const users = { "36325606": "Michel", "45239705": "Socio" };

    function checkLogin() {
        const pass = document.getElementById('pass-input').value;
        if (users[pass]) {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('main-app').classList.remove('hidden');
            document.getElementById('welcome-msg').innerText = users[pass];
            renderSchedule();
        } else {
            alert("Acceso Denegado");
        }
    }

    function renderSchedule() {
        const container = document.getElementById('calendar-container');
        const config = [
            { year: 2026, start: "2026-04-01", end: "2026-08-31" },
            { year: 2027, start: "2027-04-01", end: "2027-08-31" },
            { year: 2028, start: "2028-04-01", count: 94 }
        ];

        config.forEach(period => {
            const yearSection = document.createElement('div');
            yearSection.innerHTML = `<h3 class="text-xl font-black mb-4 gold-text border-b border-gray-800 pb-2 italic uppercase tracking-tighter">${period.year}</h3>`;
            
            const grid = document.createElement('div');
            grid.className = "grid grid-cols-7 gap-2";
            
            // Lógica simplificada para visualizar los espacios de pago
            let totalDays = period.count || 153; 
            for(let i=1; i<=totalDays; i++) {
                const day = document.createElement('div');
                day.className = "h-10 w-full flex items-center justify-center rounded-lg bg-[#1a1a1a] text-[10px] text-gray-600 border border-gray-800 cursor-pointer transition-all active:scale-90 hover:border-gray-500";
                day.innerText = i;
                day.onclick = function() { this.classList.toggle('paid'); };
                grid.appendChild(day);
            }
            yearSection.appendChild(grid);
            container.appendChild(yearSection);
        });
    }
</script>
</body>
</html>
