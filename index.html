<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PagoMiChurreria | Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // Tu configuración de Firebase integrada
        const firebaseConfig = {
            apiKey: "AIzaSyBAJxyifnw2qhfR17ZmOgKxfed-4H1PqsM",
            authDomain: "pagomichurreria.firebaseapp.com",
            projectId: "pagomichurreria",
            storageBucket: "pagomichurreria.firebasestorage.app",
            messagingSenderId: "105552294415",
            appId: "1:105552294415:web:e4d9ae8ed9eb4c8cac697a",
            measurementId: "G-09L9DDGYFX"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const pagosRef = ref(db, 'pagos');

        const users = { "36325606": "Michel", "45239705": "Socio" };
        let pagosRealizados = [];

        window.checkLogin = function() {
            const pass = document.getElementById('pass-input').value;
            if (users[pass]) {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('main-app').classList.remove('hidden');
                document.getElementById('welcome-msg').innerText = users[pass];
                escucharCambios();
            } else {
                alert("Código incorrecto");
            }
        }

        function escucharCambios() {
            onValue(pagosRef, (snapshot) => {
                const data = snapshot.val();
                pagosRealizados = data ? Object.values(data) : [];
                renderSchedule();
                actualizarMetricas();
            });
        }

        window.registrarPago = function(idUnico) {
            if (pagosRealizados.includes(idUnico)) return;
            if (confirm("¿Confirmar registro de pago inmutable? No se podrá borrar.")) {
                set(ref(db, 'pagos/' + idUnico), idUnico);
            }
        }

        function actualizarMetricas() {
            const total = 400;
            const realizados = pagosRealizados.length;
            document.getElementById('count-paid').innerText = realizados;
            document.getElementById('remaining-money').innerText = `$${((total - realizados) * 30000).toLocaleString()}`;
            document.getElementById('progress-fill').style.width = `${(realizados/total)*100}%`;
        }

        function renderSchedule() {
            const container = document.getElementById('calendar-container');
            container.innerHTML = '';
            const ciclos = [2026, 2027, 2028]; 
            
            ciclos.forEach(año => {
                const section = document.createElement('div');
                section.innerHTML = `<h3 class="text-xs font-bold mb-4 text-gray-500 uppercase tracking-[0.3em] border-b border-gray-900 pb-2">${año} (Abr - Ago)</h3>`;
                const grid = document.createElement('div');
                grid.className = "grid grid-cols-6 gap-2";

                // Se generan 153 espacios por ciclo aprox.
                for(let i=1; i<=153; i++) {
                    const idUnico = `pago-${año}-${i}`;
                    const yaPagado = pagosRealizados.includes(idUnico);
                    const dia = document.createElement('div');
                    dia.className = `h-12 flex items-center justify-center rounded-lg border transition-all text-[10px] ${yaPagado ? 'bg-[#d4af37] border-none text-black font-black' : 'bg-[#111] border-gray-800 text-gray-600 cursor-pointer hover:border-gray-500'}`;
                    dia.innerText = i;
                    dia.onclick = () => window.registrarPago(idUnico);
                    grid.appendChild(dia);
                }
                section.appendChild(grid);
                container.appendChild(section);
            });
        }
    </script>
    <style>
        body { background-color: #050505; color: #e0e0e0; font-family: 'Inter', sans-serif; }
        .gold-text { color: #d4af37; }
        .gold-bg { background: linear-gradient(135deg, #b8860b 0%, #d4af37 100%); }
    </style>
</head>
<body>

<div id="login-screen" class="flex flex-col items-center justify-center h-screen p-6">
    <div class="bg-[#111] border border-gray-900 p-8 w-full max-w-sm text-center rounded-3xl shadow-2xl">
        <h1 class="text-3xl font-black mb-1 tracking-tighter italic uppercase">Pago<span class="gold-text">Mi</span></h1>
        <p class="text-gray-600 text-[10px] mb-8 uppercase tracking-[0.4em]">Traspaso de Negocio</p>
        <input type="password" id="pass-input" placeholder="CONTRASEÑA" class="w-full p-4 rounded-2xl bg-black border border-gray-800 mb-4 text-center text-xl gold-text outline-none focus:border-[#d4af37]">
        <button onclick="checkLogin()" class="w-full gold-bg text-black font-black py-4 rounded-2xl uppercase text-xs tracking-widest shadow-lg active:scale-95 transition-all">Ingresar al Sistema</button>
    </div>
</div>

<div id="main-app" class="hidden max-w-md mx-auto p-6 pb-20">
    <div class="flex justify-between items-center mb-10">
        <div>
            <p class="text-[10px] text-gray-500 uppercase tracking-widest">Sesión de</p>
            <h2 class="text-xl font-bold gold-text" id="welcome-msg"></h2>
        </div>
        <button onclick="location.reload()" class="text-gray-600 text-xs hover:text-white transition">Salir</button>
    </div>

    <div class="bg-[#111] border border-gray-900 p-6 mb-10 rounded-3xl shadow-xl">
        <div class="flex justify-between items-end mb-4">
            <div>
                <p class="text-gray-500 text-[10px] uppercase font-bold mb-1 tracking-widest">Pagos Realizados</p>
                <p class="text-4xl font-black text-white"><span id="count-paid">0</span><span class="text-sm text-gray-600 font-normal"> / 400</span></p>
            </div>
            <div class="text-right">
                <p class="text-gray-500 text-[10px] uppercase font-bold mb-1 tracking-widest">Saldo Restante</p>
                <p id="remaining-money" class="text-white font-bold text-lg"></p>
            </div>
        </div>
        <div class="h-1.5 bg-gray-950 rounded-full overflow-hidden">
            <div id="progress-fill" class="h-full gold-bg transition-all duration-1000" style="width: 0%"></div>
        </div>
    </div>

    <div id="calendar-container"></div>
</div>

</body>
</html>
