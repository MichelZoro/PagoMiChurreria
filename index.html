<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PagoMiChurreria | Premium Live</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // CONFIGURACIÓN DE TU PROYECTO (Reemplaza esto con tus datos de Firebase)
        const firebaseConfig = {
            apiKey: "TU_API_KEY",
            authDomain: "tu-proyecto.firebaseapp.com",
            databaseURL: "https://tu-proyecto.firebaseio.com",
            projectId: "tu-proyecto",
            storageBucket: "tu-proyecto.appspot.com",
            messagingSenderId: "12345",
            appId: "1:12345:web:6789"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const pagosRef = ref(db, 'pagos');

        // Variables Globales
        const users = { "36325606": "Michel", "45239705": "Socio" };
        let pagosRealizados = [];

        // --- Lógica de Login ---
        window.checkLogin = function() {
            const pass = document.getElementById('pass-input').value;
            if (users[pass]) {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('main-app').classList.remove('hidden');
                document.getElementById('welcome-msg').innerText = users[pass];
                escucharCambios();
            } else {
                alert("Acceso Denegado");
            }
        }

        // --- Escuchar la Base de Datos en Tiempo Real ---
        function escucharCambios() {
            onValue(pagosRef, (snapshot) => {
                const data = snapshot.val();
                pagosRealizados = data ? Object.values(data) : [];
                renderSchedule();
                actualizarMetricas();
            });
        }

        // --- Registrar Pago en la Nube ---
        window.registrarPago = function(idUnico) {
            if (pagosRealizados.includes(idUnico)) return;

            if (confirm("¿Confirmar registro inmutable de pago?")) {
                const nuevaReferencia = ref(db, 'pagos/' + idUnico);
                set(nuevaReferencia, idUnico);
            }
        }

        function actualizarMetricas() {
            const total = 400;
            const realizados = pagosRealizados.length;
            const faltantes = total - realizados;
            document.getElementById('count-paid').innerText = realizados;
            document.getElementById('remaining-money').innerText = `$${(faltantes * 30000).toLocaleString()}`;
            document.getElementById('progress-fill').style.width = `${(realizados/total)*100}%`;
        }

        function renderSchedule() {
            const container = document.getElementById('calendar-container');
            container.innerHTML = '';
            const ciclos = [2026, 2027, 2028]; 
            
            ciclos.forEach(año => {
                const section = document.createElement('div');
                section.innerHTML = `<h3 class="text-xs font-bold mb-4 text-gray-500 uppercase tracking-[0.4em] border-b border-gray-900 pb-2">${año}</h3>`;
                const grid = document.createElement('div');
                grid.className = "grid grid-cols-6 gap-2";

                for(let i=1; i<=153; i++) {
                    const idUnico = `pago-${año}-${i}`;
                    const dia = document.createElement('div');
                    dia.id = idUnico;
                    dia.className = `h-12 w-full flex items-center justify-center rounded-lg border border-gray-800 bg-[#141414] text-[10px] transition-all ${pagosRealizados.includes(idUnico) ? 'bg-[#d4af37] text-black font-bold' : 'text-gray-500 cursor-pointer hover:border-gray-600'}`;
                    dia.innerText = i;
                    dia.onclick = () => window.registrarPago(idUnico);
                    grid.appendChild(dia);
                }
                section.appendChild(grid);
                container.appendChild(section);
            });
        }
    </script>
    <style>
        body { background-color: #0a0a0a; color: #e0e0e0; font-family: 'Inter', sans-serif; }
        .gold-text { color: #d4af37; }
        .gold-bg { background: linear-gradient(135deg, #b8860b 0%, #d4af37 100%); }
    </style>
</head>
<body>

<div id="login-screen" class="flex flex-col items-center justify-center h-screen p-6">
    <div class="bg-[#141414] border border-[#262626] p-8 w-full max-w-sm text-center rounded-2xl">
        <h1 class="text-3xl font-black mb-1 tracking-tighter italic">PAGOMI<span class="gold-text">CHURRERIA</span></h1>
        <p class="text-gray-500 text-[10px] mb-8 uppercase tracking-[0.3em]">Nube Sincronizada</p>
        <input type="password" id="pass-input" placeholder="CONTRASEÑA" class="w-full p-4 rounded-xl bg-black border border-gray-800 mb-4 text-center text-xl gold-text outline-none focus:border-[#d4af37]">
        <button onclick="checkLogin()" class="w-full gold-bg text-black font-bold py-4 rounded-xl hover:brightness-110 uppercase text-sm tracking-widest">Conectar</button>
    </div>
</div>

<div id="main-app" class="hidden max-w-md mx-auto p-6 pb-20">
    <div class="flex justify-between items-center mb-8">
        <div><h2 class="text-xl font-bold text-white" id="welcome-msg"></h2></div>
        <button onclick="location.reload()" class="text-gray-600 text-xs">Cerrar</button>
    </div>

    <div class="bg-[#141414] border border-[#262626] p-6 mb-8 rounded-2xl">
        <div class="flex justify-between items-end mb-4">
            <div>
                <p class="text-3xl font-black text-white"><span id="count-paid">0</span> <span class="text-sm text-gray-500 font-normal">/ 400</span></p>
            </div>
            <p id="remaining-money" class="text-white font-bold">$0</p>
        </div>
        <div class="h-1 bg-gray-800 rounded-full overflow-hidden">
            <div id="progress-fill" class="h-full bg-[#d4af37] transition-all duration-1000" style="width: 0%"></div>
        </div>
    </div>

    <div id="calendar-container" class="space-y-10"></div>
</div>

</body>
</html>
